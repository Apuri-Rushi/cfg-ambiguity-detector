<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFG Ambiguity Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <header class="text-center py-6">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2 drop-shadow-sm">
                CFG Ambiguity Detector
            </h1>
            <p class="text-slate-400">Parse grammars, generate abstract syntax trees, and detect ambiguity visually.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass-card p-6 rounded-3xl">
                    <h2 class="text-xl font-bold text-white mb-4 flex items-center">
                        <span class="bg-cyan-500/20 text-cyan-400 p-2 rounded-lg mr-3 shadow-inner">⚙️</span> Settings
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Context-Free Grammar (CFG)</label>
                            <textarea id="grammar-input" rows="5" 
                                class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all focus:scale-[1.01] focus:shadow-lg focus:shadow-cyan-500/20 font-mono text-sm resize-none"
                            >E -> E + E | E * E | ( E ) | id</textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Input String</label>
                            <input type="text" id="string-input" value="( ( id ) )" 
                                class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all focus:scale-[1.01] focus:shadow-lg focus:shadow-cyan-500/20 font-mono text-sm"
                            />
                        </div>

                        <button onclick="runAnalysis()" 
                            class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)] transform transition-all active:scale-95 focus:outline-none mt-2">
                            Run Analysis
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="glass-card p-6 rounded-3xl min-h-[500px] flex flex-col">
                    
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-4">
                            <h2 class="text-xl font-bold text-white">Visualization</h2>
                            <button id="play-btn" onclick="playDerivation()" style="display: none;" 
                                class="flex items-center justify-center gap-2 bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 px-3 py-1.5 rounded-lg text-sm font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                <span>▶ Play Derivation</span>
                            </button>
                        </div>
                        
                        <div id="result-badge" class="px-4 py-2 rounded-lg font-bold text-sm bg-slate-800 border border-slate-700 transition-all duration-300">
                            Awaiting Input...
                        </div>
                    </div>
                    
                    <div id="tree-container" class="tree-stage flex-1 flex flex-row flex-wrap justify-center gap-6 overflow-auto items-center rounded-2xl p-4 border border-white/5">
                        <p class="text-slate-500 text-center w-full">Click "Run Analysis" to generate parse trees.</p>
                    </div>
                    
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
