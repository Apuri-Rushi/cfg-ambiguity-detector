<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFG Ambiguity Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#020617] text-slate-200 min-h-screen font-sans p-6">
    <div class="max-w-6xl mx-auto space-y-6">

        <header class="text-center py-6">
            <h1
                class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-cyan-300 mb-2 drop-shadow-sm">
                CFG Ambiguity Detector
            </h1>
            <p class="text-slate-400">Parse grammars, generate abstract syntax trees, and detect ambiguity visually.</p>
        </header>

        <main class="flex flex-col gap-6 w-full">
            <!-- TOP WORKFLOW AREA -->
            <div id="workflow-container"
                class="flex flex-col lg:flex-row justify-center items-stretch gap-6 w-full transition-all duration-500">
                <!-- Settings Card -->
                <div
                    class="glass-card p-6 rounded-3xl w-full lg:max-w-md shrink-0 flex flex-col transition-all duration-500 relative z-10">
                    <h2 class="text-xl font-bold text-white mb-4 flex items-center">
                        <span class="bg-sky-500/20 text-sky-400 p-2 rounded-lg mr-3 shadow-inner">⚙️</span> Settings
                    </h2>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Context-Free Grammar
                                (CFG)</label>
                            <textarea id="grammar-input" rows="5"
                                class="w-full bg-slate-800/70 border border-slate-700 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-400 transition-all focus:scale-[1.01] focus:shadow-lg focus:shadow-sky-400/20 font-mono text-sm resize-none">E -> E + E | E * E | ( E ) | id</textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Input String</label>
                            <input type="text" id="string-input" value="( ( id ) )"
                                class="w-full bg-slate-800/70 border border-slate-700 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-400 transition-all focus:scale-[1.01] focus:shadow-lg focus:shadow-sky-400/20 font-mono text-sm" />
                        </div>

                        <button onclick="runAnalysis()"
                            class="w-full bg-gradient-to-r from-sky-400 to-blue-500 hover:from-sky-300 hover:to-blue-400 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_20px_rgba(56,189,248,0.4)] hover:shadow-[0_0_30px_rgba(56,189,248,0.6)] transform transition-all active:scale-95 focus:outline-none mt-2">
                            Run Analysis
                        </button>

                        <button id="fix-ambiguity-btn" onclick="fixAmbiguity()" style="display: none;"
                            class="w-full bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-400 hover:to-indigo-400 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_15px_rgba(59,130,246,0.4)] hover:shadow-[0_0_25px_rgba(59,130,246,0.6)] transform transition-all active:scale-95 focus:outline-none mt-4">
                            Fix Ambiguity
                        </button>
                    </div>
                </div>

                <!-- Fix Ambiguity Suggestion Box -->
                <div id="suggestion-box"
                    class="glass-card p-6 rounded-3xl w-full lg:max-w-md shrink-0 flex flex-col hidden opacity-0 scale-95 origin-top lg:origin-left transition-all duration-500 ease-out">
                    <h2 class="text-xl font-bold text-white mb-4 flex items-center">
                        <span class="bg-blue-500/20 text-blue-300 p-2 rounded-lg mr-3 shadow-inner">✨</span>
                        Suggested Unambiguous Grammar
                    </h2>
                    <div id="suggestion-content" class="text-slate-300 text-sm space-y-3">
                        <!-- Content goes here -->
                    </div>
                </div>
            </div>

            <!-- VISUALIZATION AREA -->
            <div class="w-full">
                <div class="glass-card p-6 rounded-3xl min-h-[500px] flex flex-col transition-all duration-500">

                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-4">
                            <h2 class="text-xl font-bold text-white">Visualization</h2>
                            <button id="play-btn" onclick="playDerivation()" style="display: none;"
                                class="flex items-center justify-center gap-2 border border-sky-400 text-sky-300 hover:bg-sky-500/10 px-3 py-1.5 rounded-lg text-sm font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                <span>▶ Play Derivation</span>
                            </button>
                        </div>

                        <div id="result-badge"
                            class="px-4 py-2 rounded-lg font-bold text-sm bg-slate-800 border border-slate-700 transition-all duration-300">
                            Awaiting Input...
                        </div>
                    </div>

                    <div id="tree-container"
                        class="tree-stage flex-1 flex flex-row flex-wrap justify-center gap-6 overflow-auto items-center rounded-2xl p-4 border border-white/5">
                        <p class="text-slate-500 text-center w-full">Click "Run Analysis" to generate parse trees.</p>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
